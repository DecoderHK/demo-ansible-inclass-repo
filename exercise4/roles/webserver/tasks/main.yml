---
- name: install nginx
  become: true
  package:
    name: nginx
    state: present
- name: start nginx
  become: true
  service:
    name: nginx
    state: started
    enabled: true
- name: copy site.conf
  become: true
  template:
    src: site.conf.j2
    dest: /etc/nginx/conf.d/site.conf
    mode: '0644'
